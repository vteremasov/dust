<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Infinity Canvas - WebGPU & Pure C</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;800&display=swap" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'Outfit';
            src: url('Outfit-Medium.ttf') format('truetype');
            font-weight: 500;
            font-style: normal;
        }

        :root {
            --bg-color: #0b0d11;
            --card-bg: rgba(20, 24, 33, 0.75);
            --card-border: rgba(255, 255, 255, 0.08);
            --accent: #5e6ad2;
            --accent-glow: rgba(94, 106, 210, 0.4);
            --text-color: #e2e8f0;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            overflow: hidden;
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            touch-action: none;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Outfit', sans-serif;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            touch-action: none;
        }

        /* Glassmorphic overlay panels */
        .glass-panel {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5),
                inset 0 1px 1px rgba(255, 255, 255, 0.1);
            position: absolute;
            z-index: 10;
            transition: border-color 0.3s cubic-bezier(0.16, 1, 0.3, 1),
                        box-shadow 0.3s cubic-bezier(0.16, 1, 0.3, 1),
                        background-color 0.3s cubic-bezier(0.16, 1, 0.3, 1),
                        opacity 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .glass-panel:hover {
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6),
                0 0 15px var(--accent-glow);
        }

        #bottom-ui-container {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            z-index: 10;
            pointer-events: none;
            width: auto;
            max-width: 95vw;
        }

        #bottom-ui-container>* {
            pointer-events: auto;
            position: static !important;
            transform: none !important;
        }

        #toolbar {
            display: flex;
            flex-direction: row;
            gap: 8px;
            padding: 8px;
            align-items: center;
        }

        #toolbar .btn {
            width: 40px;
            height: 40px;
            padding: 0;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        #toolbar .color-picker {
            width: 40px;
            height: 40px;
            margin: 0;
            padding: 0;
            background: transparent;
            border: none;
            cursor: pointer;
        }

        #toolbar .color-picker::-webkit-color-swatch-wrapper {
            padding: 0;
        }

        #toolbar .color-picker::-webkit-color-swatch {
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .toolbar-divider {
            width: 1px;
            height: 24px;
            background: rgba(255, 255, 255, 0.15);
            margin: 0 4px;
        }

        #info-panel {
            bottom: 20px;
            right: 20px;
            padding: 12px 20px;
            font-size: 0.85rem;
            color: var(--text-muted);
            border-radius: 12px;
            min-width: 320px;
            transition: border-color 0.3s cubic-bezier(0.16, 1, 0.3, 1),
                        box-shadow 0.3s cubic-bezier(0.16, 1, 0.3, 1),
                        background-color 0.3s cubic-bezier(0.16, 1, 0.3, 1),
                        opacity 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        h1 {
            font-size: 1.4rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff 30%, var(--text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .subtitle {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .control-group {
            margin-bottom: 16px;
        }

        .control-label {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .shortcut-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            margin-bottom: 8px;
        }

        .key {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 6px;
            padding: 2px 8px;
            font-family: monospace;
            font-size: 0.75rem;
            box-shadow: 0 2px 0 rgba(0, 0, 0, 0.3);
        }

        .btn {
            background: var(--accent);
            border: none;
            color: white;
            padding: 10px 16px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px var(--accent-glow);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
            margin-top: 8px;
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(94, 106, 210, 0.6);
            background: #6c79e6;
        }

        .btn:active {
            transform: translateY(1px);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-color);
            box-shadow: none;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: none;
        }

        .btn-widget {
            margin-top: 0 !important;
            padding: 8px 12px;
            font-size: 0.8rem;
        }

        /* Loading Spinner */
        #loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
            text-align: center;
            transition: opacity 0.5s ease;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(94, 106, 210, 0.1);
            border-radius: 50%;
            border-top-color: var(--accent);
            animation: spin 1s ease-in-out infinite;
            margin: 0 auto 16px;
            box-shadow: 0 0 15px var(--accent-glow);
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        #error-msg {
            color: #ff6b6b;
            font-size: 0.9rem;
            margin-top: 10px;
            max-width: 300px;
            word-wrap: break-word;
        }

        /* Editing input box helper */
        #text-editor {
            position: absolute;
            z-index: 20;
            background: var(--bg-color);
            border: 2px solid var(--accent);
            color: var(--text-color);
            font-family: inherit;
            font-size: 14px;
            padding: 8px;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            display: none;
            outline: none;
            font-kerning: none;
            font-variant-ligatures: none;
            white-space: pre;
        }

        .input-field {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            color: var(--text-color);
            padding: 6px 10px;
            font-family: inherit;
            font-size: 0.85rem;
            outline: none;
            transition: all 0.2s ease;
        }

        .input-field:focus {
            border-color: var(--accent);
            box-shadow: 0 0 8px var(--accent-glow);
            background: rgba(255, 255, 255, 0.08);
        }

        .color-picker {
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 6px;
            cursor: pointer;
            background: transparent;
            padding: 0;
        }

        .color-picker::-webkit-color-swatch-wrapper {
            padding: 0;
        }

        .color-picker::-webkit-color-swatch {
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
        }

        #properties-panel {
            display: none;
            flex-direction: row;
            gap: 8px;
            padding: 6px 8px;
            align-items: center;
            width: auto;
        }

        .prop-size-input {
            width: 48px;
        }

        .prop-font-input {
            width: 44px;
        }

        .prop-color-group {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        #properties-panel input[type="checkbox"] {
            cursor: pointer;
            width: 14px;
            height: 14px;
            accent-color: var(--accent);
        }

        #properties-panel .input-field {
            padding: 4px 6px;
            font-size: 0.75rem;
            border-radius: 4px;
        }

        #properties-panel .color-picker {
            width: 24px;
            height: 24px;
            border-radius: 4px;
        }

        #properties-panel .color-picker::-webkit-color-swatch {
            border-radius: 4px;
        }

        #properties-panel input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            background: rgba(255, 255, 255, 0.1);
            height: 6px;
            border-radius: 3px;
            outline: none;
            accent-color: var(--accent);
            width: 60px;
        }

        #properties-panel input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
            transition: transform 0.1s ease;
        }

        #properties-panel input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        #properties-panel .btn-widget {
            width: 32px;
            height: 32px;
            padding: 0;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 6px;
            box-shadow: none;
        }

        @media (max-width: 650px) {
            #bottom-ui-container {
                bottom: 10px;
                width: 95vw;
                max-width: 480px;
                gap: 8px;
            }

            #toolbar,
            #properties-panel {
                width: 100% !important;
                flex-wrap: wrap;
                justify-content: center;
                gap: 6px !important;
                padding: 10px 8px !important;
                border-radius: 12px;
            }

            #toolbar .btn,
            #properties-panel .btn-widget {
                width: 38px !important;
                height: 38px !important;
                border-radius: 6px;
            }

            #toolbar .color-picker {
                width: 38px !important;
                height: 38px !important;
            }

            #properties-panel {
                padding: 8px !important;
            }

            #properties-panel .toolbar-divider {
                display: none;
            }

            #info-panel {
                bottom: auto !important;
                top: 10px !important;
                right: 10px !important;
                left: auto !important;
                padding: 6px 12px !important;
                font-size: 0.75rem !important;
                border-radius: 8px;
            }
        }
    </style>
</head>

<body>
    <div id="loader">
        <div class="spinner"></div>
        <div style="font-weight: 600; letter-spacing: 0.05em;">INITIALIZING WEBGPU ENGINE</div>
        <div id="error-msg"></div>
    </div>

    <!-- The interactive canvas -->
    <canvas id="canvas"></canvas>

    <!-- Hidden text input helper for double click editing -->
    <textarea id="text-editor" maxlength="100000"></textarea>



    <!-- Bottom UI Container for toolbar + properties -->
    <div id="bottom-ui-container">

        <!-- Properties Inspector Panel (now above toolbar) -->
        <div id="properties-panel" class="glass-panel" style="display: none;">
            <!-- Group 1: Size -->
            <div id="size-group" style="display: flex; gap: 8px; align-items: center;">
                <input type="number" id="prop-w" class="input-field prop-size-input" title="Width" placeholder="W"
                    min="10">
                <input type="number" id="prop-h" class="input-field prop-size-input" title="Height" placeholder="H"
                    min="10">
                <div class="toolbar-divider"></div>
            </div>

            <!-- Group 2: Typography -->
            <div id="font-group" style="display: flex; gap: 8px; align-items: center;">
                <input type="number" id="prop-font-size" class="input-field prop-font-input" title="Font Size (px)"
                    placeholder="Size" min="6" max="120">
                <div class="toolbar-divider"></div>
            </div>

            <!-- Group 3: Background / Line Color -->
            <span id="bg-color-label" style="display: none;"></span>
            <div class="prop-color-group" style="display: flex; gap: 6px; align-items: center;">
                <input type="color" id="prop-bg-color" class="color-picker" title="Background Color">
                <input type="range" id="prop-bg-opacity" min="0" max="100" value="100" title="Background Opacity" style="cursor: pointer;">
                <span id="prop-bg-opacity-val" style="font-size: 0.75rem; width: 32px; text-align: right; color: var(--text-muted); font-family: monospace;">100%</span>
                <input type="checkbox" id="prop-bg-transparent" title="Transparent Background">
            </div>

            <div class="toolbar-divider"></div>

            <!-- Group 4: Font Color -->
            <div id="font-color-group" style="display: flex; gap: 8px; align-items: center;">
                <input type="color" id="prop-font-color" class="color-picker" title="Font Color">
                <div class="toolbar-divider"></div>
            </div>

            <!-- Group 5: Border -->
            <div id="border-group" style="display: flex; gap: 8px; align-items: center;">
                <div class="prop-color-group" style="display: flex; gap: 6px; align-items: center;">
                    <input type="color" id="prop-border-color" class="color-picker" title="Border Color">
                    <input type="checkbox" id="prop-border-transparent" title="No Border">
                </div>
                <div class="toolbar-divider"></div>
            </div>

            <!-- Group 6: Z-Order -->
            <div style="display: flex; gap: 6px; align-items: center;">
                <button id="btn-z-front" class="btn btn-secondary btn-widget" title="Bring to Front">
                    <svg style="width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 2;"
                        viewBox="0 0 24 24">
                        <path d="M5 4h14M12 20V8m0 0l-5 5m5-5l5 5" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                </button>
                <button id="btn-z-forward" class="btn btn-secondary btn-widget" title="Bring Forward">
                    <svg style="width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 2;"
                        viewBox="0 0 24 24">
                        <path d="M12 20V4m0 0l-7 7m7-7l7 7" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                </button>
                <button id="btn-z-backward" class="btn btn-secondary btn-widget" title="Send Backward">
                    <svg style="width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 2;"
                        viewBox="0 0 24 24">
                        <path d="M12 4v16m0 0l-7-7m7 7l7-7" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                </button>
                <button id="btn-z-back" class="btn btn-secondary btn-widget" title="Send to Back">
                    <svg style="width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 2;"
                        viewBox="0 0 24 24">
                        <path d="M5 20h14M12 4v12m0 0l-5-5m5 5l5-5" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                </button>
            </div>
        </div>

        <!-- Glassmorphic Toolbar -->
        <div id="toolbar" class="glass-panel">
            <button class="btn btn-widget" id="btn-add-sticky"
                title="Add Sticky Note (Double-click board to add at cursor)">
                <svg style="width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 2;"
                    viewBox="0 0 24 24">
                    <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h10l6-6V5c0-1.1-.9-2-2-2z" stroke-linecap="round"
                        stroke-linejoin="round" />
                    <path d="M15 21v-6h6" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
            </button>
            <button class="btn btn-widget" id="btn-add-rect" title="Add Rectangle Shape">
                <svg style="width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 2;"
                    viewBox="0 0 24 24">
                    <rect x="3" y="3" width="18" height="18" rx="2" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
            </button>
            <button class="btn btn-widget" id="btn-add-oval" title="Add Oval Shape">
                <svg style="width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 2;"
                    viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="9" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
            </button>
            <button class="btn btn-widget" id="btn-add-triangle" title="Add Triangle Shape">
                <svg style="width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 2;"
                    viewBox="0 0 24 24">
                    <polygon points="12,3 2,21 22,21" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
            </button>
            <button class="btn btn-widget" id="btn-add-text" title="Add Text Label">
                <svg style="width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 2;"
                    viewBox="0 0 24 24">
                    <path d="M4 7V4h16v3M9 20h6M12 4v16" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
            </button>
            <button class="btn btn-widget" id="btn-add-code" title="Add Code Block">
                <svg style="width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 2;"
                    viewBox="0 0 24 24">
                    <path d="M16 18l6-6-6-6M8 6L2 12l6 6" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
            </button>
            <button class="btn btn-secondary" id="btn-add-image" title="Upload and Place Image">
                <svg style="width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 2;"
                    viewBox="0 0 24 24">
                    <rect x="3" y="3" width="18" height="18" rx="2" stroke-linecap="round" stroke-linejoin="round" />
                    <circle cx="8.5" cy="8.5" r="1.5" fill="currentColor" />
                    <path d="M21 15l-5-5L5 21" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
            </button>

            <div class="toolbar-divider"></div>

            <button class="btn btn-secondary" id="btn-toggle-draw" title="Toggle Draw Tool (Freehand drawing)">
                <svg style="width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 2;"
                    viewBox="0 0 24 24">
                    <path d="M12 20h9M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
                <span id="draw-btn-text" style="display: none;">Draw Tool: OFF</span>
            </button>
            <input type="color" id="draw-color-picker" class="color-picker" value="#1accde"
                title="Choose Drawing Color">
            <button class="btn btn-secondary" id="btn-toggle-connection"
                title="Toggle Connection Tool (Shift + click shape to connect)">
                <svg style="width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 2;"
                    viewBox="0 0 24 24">
                    <rect x="3" y="14" width="6" height="6" rx="1" />
                    <rect x="15" y="4" width="6" height="6" rx="1" />
                    <path d="M9 17h3a2 2 0 0 0 2-2V9a2 2 0 0 1 2-2h1" />
                    <path d="M16 5l2 2-2 2" />
                </svg>
                <span id="connection-btn-text" style="display: none;">Connection Tool: OFF</span>
            </button>

            <div class="toolbar-divider"></div>

            <button class="btn btn-secondary" id="btn-bulk-create" title="Create 100k Infographics (Reset Board)">
                <svg style="width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 2;"
                    viewBox="0 0 24 24">
                    <rect x="3" y="3" width="7" height="7" rx="1" />
                    <rect x="14" y="3" width="7" height="7" rx="1" />
                    <rect x="3" y="14" width="7" height="7" rx="1" />
                    <rect x="14" y="14" width="7" height="7" rx="1" />
                </svg>
            </button>
            <button class="btn btn-secondary" id="btn-clear" title="Clear all nodes and connections from the board">
                <svg style="width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 2;"
                    viewBox="0 0 24 24">
                    <polyline points="3 6 5 6 21 6" />
                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
                    <line x1="10" y1="11" x2="10" y2="17" />
                    <line x1="14" y1="11" x2="14" y2="17" />
                </svg>
            </button>
            <input type="file" id="image-loader" accept="image/*" style="display: none;" />
        </div>

    </div> <!-- end #bottom-ui-container -->

    <!-- Display Stats -->
    <div id="info-panel" class="glass-panel">
        <div style="display: flex; align-items: center; justify-content: space-between; gap: 10px; width: 100%;">
            <div style="display: flex; align-items: center;">
                <span>Pan: </span><span id="stat-pan"
                    style="font-weight: 600; color: var(--text-color); margin-left: 4px; font-family: monospace; display: inline-block; min-width: 110px;">X: 0, Y: 0</span>
                <span style="margin: 0 8px; color: rgba(255,255,255,0.15);">|</span>
                <span>Zoom: </span><span id="stat-zoom"
                    style="font-weight: 600; color: var(--text-color); margin-left: 4px; font-family: monospace; display: inline-block; min-width: 45px;">100%</span>
                <span style="margin: 0 8px; color: rgba(255,255,255,0.15);">|</span>
                <span>Shapes: </span><span id="stat-nodes"
                    style="font-weight: 600; color: var(--text-color); margin-left: 4px; font-family: monospace; display: inline-block; min-width: 30px;">0</span>
            </div>
            <button id="btn-toggle-debug" title="Toggle debug info"
                style="background: rgba(94, 106, 210, 0.15); border: 1px solid rgba(94, 106, 210, 0.3); color: #8b94f6; font-family: inherit; font-size: 0.75rem; font-weight: 600; padding: 4px 8px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; gap: 4px; transition: all 0.2s;">
                <span>🐞</span><span>Debug</span>
            </button>
        </div>
        <div id="debug-expanded-panel"
            style="display: none; margin-top: 12px; border-top: 1px solid rgba(255, 255, 255, 0.1); padding-top: 12px; font-size: 0.75rem; color: var(--text-muted);">
            <!-- Will be populated dynamically by JS -->
        </div>
    </div>

    <script type="module" src="bridge.js"></script>
